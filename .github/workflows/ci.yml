name: CI

# NOTE: This workflow lives in the REAL app repo (flat layout — app at root).
# A prior ci.yml existed only in the stale outer folder with `working-directory:
# prolific-hr-app` paths and was never on GitHub → CI was effectively not running.
# This replaces it. First push: watch the Actions tab and expect a shakedown pass
# (the most likely tweaks are the Supabase key-capture step and Deno task names).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Frontend — ESLint + strict TypeScript build
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend — Lint + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      # Advisory for now: ~79 pre-existing src/ ESLint violations predate this gate.
      # Track a cleanup pass, then remove `continue-on-error` to make lint blocking.
      - run: npm run lint
        continue-on-error: true
      - run: npm run build

  # ---------------------------------------------------------------------------
  # Edge Functions — Deno type-check + shared-utility tests
  # ---------------------------------------------------------------------------
  edge-functions:
    name: Edge Functions — Deno check + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Type-check shared utilities
        working-directory: supabase/functions
        run: deno task check
      - name: Run shared-utility tests
        working-directory: supabase/functions
        env:
          SUPABASE_URL: http://localhost:54321
          SUPABASE_ANON_KEY: test-anon-key
          ALLOWED_ORIGIN_1: https://app.prolifichr.com
          ALLOWED_ORIGIN_2: http://localhost:5173
        run: deno test _shared/tests/ --allow-env --allow-net

  # ---------------------------------------------------------------------------
  # Invariant guards — cheap grep gates for known footguns. Fast, no deps.
  # Added after the 2026-05-28 onConflict regression: people/applicants
  # uniqueness is (tenant_id, email_normalized); upserting ON CONFLICT
  # (tenant_id, email) raises 42P10 at runtime. This catches a reversion in CI.
  # ---------------------------------------------------------------------------
  invariant-guards:
    name: Invariant Guards — forbidden patterns
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: No (tenant_id,email) onConflict on people/applicants
        shell: bash
        run: |
          # Exact match on the wrong target; the test file intentionally uses it
          # to assert the 42P10 failure, so exclude _shared/tests/.
          HITS="$(grep -rEn 'onConflict:[[:space:]]*"tenant_id,email"' supabase/functions --include='*.ts' | grep -v '/tests/' || true)"
          if [ -n "$HITS" ]; then
            echo "$HITS"
            echo "::error::Found onConflict:\"tenant_id,email\". people/applicants uniqueness is (tenant_id,email_normalized) — use \"tenant_id,email_normalized\"."
            exit 1
          fi
          echo "OK — no forbidden (tenant_id,email) onConflict targets."

  # ---------------------------------------------------------------------------
  # Tenant-isolation gate — clean full migration apply + RLS suite.
  # This is the gate that protects the multi-tenant boundary. It also proves a
  # FRESH database boots cleanly (DR / new-env insurance) — only possible now
  # that the bootstrap bugs (empty-tenants backfill, audit_ai_cache) are fixed.
  # ---------------------------------------------------------------------------
  rls-isolation:
    name: Tenant Isolation — fresh DB + RLS suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase
        run: supabase start

      - name: Clean full migration apply (bootstrap gate — must apply ALL with no workarounds)
        run: supabase db reset

      - name: Run two-tenant RLS isolation suite
        working-directory: supabase/tests/rls
        shell: bash
        run: |
          # Capture the local stack's URL + keys from `supabase status`.
          # The CLI's var names / key format are a moving target (legacy JWT vs
          # new opaque sb_secret_… keys). Print the CLI version and a MASKED dump
          # (names + 6-char prefixes; values are throwaway local-stack keys) so a
          # shakedown is diagnosable from the log instead of by guessing.
          echo "supabase CLI: $(supabase --version)"
          supabase status -o env --workdir "$GITHUB_WORKSPACE" \
            | sed -E 's/=(.{6}).*/=\1…(masked)/'
          eval "$(supabase status -o env --workdir "$GITHUB_WORKSPACE" | sed 's/^/export /')"
          : "${API_URL:=http://127.0.0.1:54321}"
          SRK="${SERVICE_ROLE_KEY:-$SECRET_KEY}"
          AK="${ANON_KEY:-$PUBLISHABLE_KEY}"
          # New opaque keys (sb_secret_… / sb_publishable_…) are not JWTs. When
          # the captured key is NOT a JWT (doesn't start with eyJ), fall back to
          # canonical local-stack demo JWTs so the suite still gets a real
          # service_role. Deterministic; immune to the CLI's key-format churn.
          DEMO_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJpYXQiOjE2NDE3NjkyMDAsImV4cCI6MTc5OTUzNTYwMH0.dc_X5iR_VP_qT0zsiyj_I_OZ2T9FtRU2BBNWN8Bu4GE'
          DEMO_SERVICE='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTY0MTc2OTIwMCwiZXhwIjoxNzk5NTM1NjAwfQ.DaYlNEoUrrEn2Ig7tqibS-PHK5vgusbcbo7X36XVt4Q'
          case "$SRK" in eyJ*) :;; *) echo "::warning::SERVICE key is not a JWT — using canonical local demo service_role JWT"; SRK="$DEMO_SERVICE";; esac
          case "$AK"  in eyJ*) :;; *) AK="$DEMO_ANON";; esac
          # Empty keys make loadEnv() SKIP the suite (false green) — fail loud.
          if [ -z "$SRK" ] || [ -z "$AK" ]; then
            echo "::error::Could not resolve ANON/SERVICE keys from 'supabase status -o env' (see masked dump above)."
            exit 1
          fi
          SUPABASE_URL="$API_URL" \
          SUPABASE_ANON_KEY="$AK" \
          SUPABASE_SERVICE_ROLE_KEY="$SRK" \
          deno task test:rls

  # ---------------------------------------------------------------------------
  # Migration-parity gate (push to main only) — local migration files MUST match
  # the deployed ledger. Prevents the exact trunk/prod drift that was just fixed.
  # Requires repo secrets: SUPABASE_ACCESS_TOKEN, SUPABASE_PROJECT_REF, SUPABASE_DB_PASSWORD.
  # Skips cleanly until those secrets exist.
  # ---------------------------------------------------------------------------
  migration-parity:
    name: Migration Parity (main only)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Verify local migrations == deployed ledger (dry-run shows NOTHING pending)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        shell: bash
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$PROJECT_REF" ]; then
            echo "::warning::SUPABASE_ACCESS_TOKEN / SUPABASE_PROJECT_REF not set — skipping parity gate."
            exit 0
          fi
          supabase link --project-ref "$PROJECT_REF"
          PENDING="$(supabase db push --dry-run 2>&1)"
          echo "$PENDING"
          # A clean trunk has nothing to push. Anything pending = drift = fail.
          if echo "$PENDING" | grep -qiE 'Would push|Applying migration|[0-9]+ migration'; then
            echo "::error::Local migrations differ from the deployed ledger — drift detected."
            exit 1
          fi
          echo "Migration parity OK — main matches the deployed database."
